<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HCMS - Edit Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/modern-portal.css">
</head>
<body>
    <div class="portal-container">
        <!-- Sidebar injected here -->
        
        <main class="content-area">
            <div style="max-width: 800px; margin: 0 auto;">
                <header style="margin-bottom: 32px;">
                    <h2 style="font-size: 28px; font-weight: 800; margin-bottom: 4px;">Edit Profile</h2>
                    <p style="color: var(--text-muted);">Keep your contact and medical information up to date.</p>
                </header>

                <div class="modern-card">
                    <form id="profile-edit-form">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;">
                            <div class="form-group">
                                <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px;">Full Name</label>
                                <input type="text" id="edit-fullName" class="form-control" placeholder="Your full name" required>
                            </div>
                            <div class="form-group">
                                <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px;">Phone Number</label>
                                <input type="text" id="edit-phone" class="form-control" placeholder="+1 234 567 890">
                            </div>
                            <div class="form-group">
                                <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px;">Gender</label>
                                <select id="edit-gender" class="form-control">
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px;">Date of Birth</label>
                                <input type="date" id="edit-dob" class="form-control">
                            </div>
                        </div>

                        <div class="form-group" style="margin-bottom: 24px;">
                            <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px;">Address</label>
                            <input type="text" id="edit-address" class="form-control" placeholder="Street name and number">
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;">
                            <div class="form-group">
                                <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px;">City</label>
                                <input type="text" id="edit-city" class="form-control">
                            </div>
                            <div class="form-group">
                                <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px;">State</label>
                                <input type="text" id="edit-state" class="form-control">
                            </div>
                            <div class="form-group">
                                <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px;">Blood Group</label>
                                <input type="text" id="edit-blood" class="form-control" placeholder="e.g. O+">
                            </div>
                            <div class="form-group">
                                <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px;">Emergency Contact</label>
                                <input type="text" id="edit-emergency" class="form-control">
                            </div>
                        </div>

                        <div class="form-group" style="margin-bottom: 32px;">
                            <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px;">Medical History</label>
                            <textarea id="edit-medical" class="form-control" style="height: 120px;" placeholder="Summarize your past medical conditions..."></textarea>
                        </div>

                        <div style="display: flex; gap: 12px; justify-content: flex-end; border-top: 1px solid #f1f5f9; padding-top: 24px;">
                            <a href="profile.html" class="btn-large" style="background: #f1f5f9; color: #1e293b; text-decoration: none;">Cancel</a>
                            <button type="submit" class="btn-submit" style="width: auto;">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/profile-edit.js"></script>
    <script type="module">
        import { injectSidebar } from './js/components/sidebar.js';
        injectSidebar('profile');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HCMS - My Complaints</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/modern-portal.css">
</head>
<body>
    <div class="portal-container">
        <!-- Sidebar injected here -->
        
        <main class="content-area">
            <div style="max-width: 800px; margin: 0 auto;">
                <header style="margin-bottom: 32px;">
                    <h2 style="font-size: 28px; font-weight: 800; margin-bottom: 4px;">My Complaints</h2>
                    <p style="color: var(--text-muted);">Track the status of issues you've reported.</p>
                </header>

                <div id="my-complaints-list">
                    <div style="text-align: center; padding: 40px; color: var(--text-muted);">
                        <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                        <p style="margin-top: 12px;">Loading your complaints...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { injectSidebar } from './js/components/sidebar.js';
        import { fetchComplaintsFiltered, deleteComplaint } from './js/api.js';
        
        injectSidebar('my-complaints');
        
        const user = JSON.parse(localStorage.getItem('hcmsUser'));
        
        const loadMyComplaints = async () => {
            const container = document.getElementById('my-complaints-list');
            try {
                // Filter by keyword or something since there is no 'mine' endpoint?
                // Actually fetchAll and filter for now as a simple approach
                const all = await fetchComplaintsFiltered();
                const mine = all.filter(c => c.user?.id === user.id);
                
                if (mine.length === 0) {
                    container.innerHTML = `
                        <div class="modern-card" style="text-align: center; padding: 60px;">
                            <i class="fas fa-clipboard-list fa-3x" style="opacity: 0.1; margin-bottom: 20px;"></i>
                            <h3>No complaints yet</h3>
                            <p style="color: var(--text-muted); margin-bottom: 24px;">You haven't reported any issues. Head to the feed to see what others are saying.</p>
                            <a href="feed.html" class="btn-submit" style="display: inline-block; width: auto; text-decoration: none;">Go to Feed</a>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = '';
                mine.forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'modern-card';
                    card.style.marginBottom = '16px';
                    const statusClass = `status-${c.status}`;
                    
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div>
                                <span class="status-badge ${statusClass}" style="margin-bottom: 12px; display: inline-block;">${c.status}</span>
                                <h3 style="margin-bottom: 8px;">${c.title}</h3>
                                <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 12px;">Reported on ${new Date(c.createdAt).toLocaleDateString()}</p>
                                <p>${c.description}</p>
                            </div>
                            <button class="action-btn delete-btn" style="color: var(--danger);">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    `;
                    
                    card.querySelector('.delete-btn').onclick = async () => {
                        if (confirm('Are you sure you want to delete this complaint?')) {
                            try {
                                await deleteComplaint(c.id, user.id);
                                loadMyComplaints();
                            } catch (e) {
                                alert('Failed to delete: ' + e.message);
                            }
                        }
                    };
                    
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = '<div class="modern-card" style="text-align: center; color: var(--danger);">Failed to load complaints.</div>';
            }
        };

        loadMyComplaints();
        
        // Dynamic Polling: Refresh every 30 seconds
        setInterval(loadMyComplaints, 30000);
    </script>
</body>
</html>

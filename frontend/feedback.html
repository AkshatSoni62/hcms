<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HCMS - Feedback</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/modern-portal.css">
    <style>
        .feedback-item {
            padding: 24px;
            border-bottom: 1px solid var(--border-light);
            transition: background 0.2s;
            position: relative;
        }
        .feedback-item:hover {
            background: #f8fafc;
        }
        .feedback-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .feedback-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-size: 20px;
        }
        .feedback-user-name {
            font-weight: 700;
            color: var(--text-main);
        }
        .feedback-user-role {
            font-size: 12px;
            color: var(--text-muted);
        }
        .feedback-subject {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 8px;
        }
        .feedback-message {
            color: var(--text-main);
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .feedback-date {
            font-size: 12px;
            color: var(--text-muted);
        }
        .status-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 99px;
            text-transform: uppercase;
        }
        .status-PENDING { background: #fef3c7; color: #92400e; }
        .status-RESOLVED { background: #dcfce7; color: #166534; }
        
        .admin-response-box {
            margin-top: 16px;
            padding: 16px;
            background: #f1f5f9;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            position: relative;
        }
        .admin-response-header {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 4px;
            color: var(--primary);
        }
        .admin-response-text {
            font-size: 14px;
            color: #334155;
            line-height: 1.5;
        }
        .admin-actions {
            margin-top: 12px;
            display: flex;
            gap: 12px;
        }
        .btn-action {
            font-size: 12px;
            font-weight: 600;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .btn-edit { color: var(--primary); }
        .btn-edit:hover { background: #e0e7ff; }
        .btn-delete { color: var(--danger); }
        .btn-delete:hover { background: #fee2e2; }

        .response-form {
            margin-top: 16px;
            padding: 16px;
            background: #fff;
            border: 1px solid var(--border-light);
            border-radius: 8px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            font-family: inherit;
        }
        textarea.form-control {
            min-height: 80px;
            resize: vertical;
        }
        .btn-resolve {
            background: var(--success);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-cancel {
            background: #f1f5f9;
            color: #1e293b;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <!-- Sidebar injected here -->
        
        <main class="content-area">
            <header style="margin-bottom: 32px;">
                <h2 id="page-title" style="font-size: 28px; font-weight: 800; margin-bottom: 4px;">Feedback</h2>
                <p id="page-subtitle" style="color: var(--text-muted);">Share your thoughts or review user feedback.</p>
            </header>

            <div id="admin-view" style="display: none;">
                <div class="modern-card" style="padding: 0;">
                    <div style="padding: 20px; border-bottom: 1px solid var(--border-light);">
                        <h3 style="margin: 0;">Manage All Feedback</h3>
                    </div>
                    <div id="feedback-list-admin">
                        <div style="padding: 40px; text-align: center; color: var(--text-muted);">
                            <i class="fas fa-spinner fa-spin" style="font-size: 24px; margin-bottom: 12px;"></i>
                            <br>Loading feedback...
                        </div>
                    </div>
                </div>
            </div>

            <div id="user-view" style="display: none;">
                <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 32px; align-items: start;">
                    <div class="modern-card">
                        <h3 style="margin-bottom: 20px;">Submit New Feedback</h3>
                        <form id="feedback-form">
                            <div class="form-group">
                                <label for="subject">Subject</label>
                                <input type="text" id="subject" class="form-control" placeholder="What is this regarding?" required>
                            </div>
                            <div class="form-group">
                                <label for="message">Your Message</label>
                                <textarea id="message" class="form-control" placeholder="Write your feedback details here..." required></textarea>
                            </div>
                            <button type="submit" class="btn-submit" style="width: 100%;">Submit Feedback</button>
                        </form>
                        <div id="feedback-success" style="display: none; text-align: center; padding: 20px;">
                            <i class="fas fa-check-circle" style="font-size: 48px; color: var(--success); margin-bottom: 16px;"></i>
                            <h3 style="margin-bottom: 8px;">Sent!</h3>
                            <p style="color: var(--text-muted);">We've received your feedback.</p>
                            <button class="btn-submit" style="margin-top: 20px; background: #f1f5f9; color: #1e293b;" onclick="location.reload()">Send Another</button>
                        </div>
                    </div>

                    <div>
                        <h3 style="margin-bottom: 20px;">My Feedback History</h3>
                        <div id="feedback-list-user" class="modern-card" style="padding: 0; min-height: 200px;">
                            <div style="padding: 40px; text-align: center; color: var(--text-muted);">
                                Loading history...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { injectSidebar } from './js/components/sidebar.js';
        import { submitFeedback, fetchAllFeedback, fetchUserFeedback, updateFeedback } from './js/api.js';

        injectSidebar('feedback');

        const user = JSON.parse(localStorage.getItem('hcmsUser'));
        if (!user) {
            window.location.href = 'login.html';
        }

        const isAdmin = user.role === 'ADMIN';
        const adminView = document.getElementById('admin-view');
        const userView = document.getElementById('user-view');
        const pageTitle = document.getElementById('page-title');
        const pageSubtitle = document.getElementById('page-subtitle');

        if (isAdmin) {
            adminView.style.display = 'block';
            pageTitle.textContent = 'Feedback Portal';
            pageSubtitle.textContent = 'Respond to users and manage system improvements.';
            loadAdminFeedback();
        } else {
            userView.style.display = 'block';
            pageTitle.textContent = 'Help Us Improve';
            pageSubtitle.textContent = 'Your feedback directly helps us build a better hospital experience.';
            setupUserForm();
            loadUserHistory();
        }

        async function loadAdminFeedback() {
            const list = document.getElementById('feedback-list-admin');
            try {
                const feedbackArr = await fetchAllFeedback();
                if (!feedbackArr || feedbackArr.length === 0) {
                    list.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-muted);">No feedback messages found.</div>';
                    return;
                }

                list.innerHTML = '';
                feedbackArr.forEach(fb => {
                    const item = document.createElement('div');
                    item.className = 'feedback-item';
                    item.id = `fb-item-${fb.id}`;
                    item.innerHTML = `
                        <div class="feedback-header">
                            <div class="feedback-user-info">
                                <div class="user-avatar"><i class="fas fa-user"></i></div>
                                <div>
                                    <div class="feedback-user-name">${fb.user?.fullName || 'Anonymous'}</div>
                                    <div class="feedback-user-role">${fb.user?.role || 'User'} • ${new Date(fb.createdAt).toLocaleDateString()}</div>
                                </div>
                            </div>
                            <span class="status-badge status-${fb.status}">${fb.status || 'PENDING'}</span>
                        </div>
                        <div class="feedback-subject">${fb.subject}</div>
                        <div class="feedback-message">${fb.message}</div>
                        
                        <div id="response-container-${fb.id}">
                            ${fb.adminResponse ? `
                                <div class="admin-response-box">
                                    <div class="admin-response-header">Official Response</div>
                                    <div class="admin-response-text">${fb.adminResponse}</div>
                                    <div class="admin-actions">
                                        <button class="btn-action btn-edit" onclick="toggleEdit(${fb.id}, \`${fb.adminResponse.replace(/`/g, '\\`')}\`)">
                                            <i class="fas fa-edit"></i> Edit
                                        </button>
                                        <button class="btn-action btn-delete" onclick="handleDeleteResponse(${fb.id})">
                                            <i class="fas fa-trash"></i> Delete
                                        </button>
                                    </div>
                                </div>
                            ` : (fb.status !== 'RESOLVED' ? `
                                <div class="response-form">
                                    <div class="form-group">
                                        <label>Add Response</label>
                                        <textarea class="form-control" id="resp-text-${fb.id}" placeholder="Type your response to the user..."></textarea>
                                    </div>
                                    <button class="btn-resolve" onclick="handleResolve(${fb.id})">Mark as Resolved</button>
                                </div>
                            ` : '')}
                        </div>
                    `;
                    list.appendChild(item);
                });
                
                // Expose handlers to window
                window.handleResolve = async (id) => {
                    const text = document.getElementById(`resp-text-${id}`).value;
                    if (!text) return alert('Please provide a resolution message.');
                    try {
                        await updateFeedback(id, text, 'RESOLVED');
                        loadAdminFeedback();
                    } catch (e) { alert(e.message); }
                };

                window.toggleEdit = (id, currentText) => {
                    const container = document.getElementById(`response-container-${id}`);
                    container.innerHTML = `
                        <div class="response-form">
                            <div class="form-group">
                                <label>Edit Response</label>
                                <textarea class="form-control" id="edit-text-${id}">${currentText}</textarea>
                            </div>
                            <button class="btn-cancel" onclick="loadAdminFeedback()">Cancel</button>
                            <button class="btn-resolve" onclick="handleSaveEdit(${id})">Update Response</button>
                        </div>
                    `;
                };

                window.handleSaveEdit = async (id) => {
                    const text = document.getElementById(`edit-text-${id}`).value;
                    if (!text) return alert('Response cannot be empty. Use delete if you want to remove it.');
                    try {
                        await updateFeedback(id, text, 'RESOLVED');
                        loadAdminFeedback();
                    } catch (e) { alert(e.message); }
                };

                window.handleDeleteResponse = async (id) => {
                    if (!confirm('Are you sure you want to delete this response? The feedback will return to PENDING status.')) return;
                    try {
                        // We pass status PENDING and an empty response to "delete" it
                        await updateFeedback(id, '', 'PENDING');
                        loadAdminFeedback();
                    } catch (e) { alert(e.message); }
                };

            } catch (e) {
                list.innerHTML = `<div style="padding: 40px; text-align: center; color: var(--danger);">Error: ${e.message}</div>`;
            }
        }

        async function loadUserHistory() {
            const list = document.getElementById('feedback-list-user');
            try {
                const history = await fetchUserFeedback(user.id);
                if (!history || history.length === 0) {
                    list.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-muted);">You haven\'t submitted any feedback yet.</div>';
                    return;
                }

                list.innerHTML = history.map(fb => `
                    <div style="padding: 16px; border-bottom: 1px solid var(--border-light);">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
                            <div style="font-weight: 700; font-size: 15px;">${fb.subject}</div>
                            <span class="status-badge status-${fb.status || 'PENDING'}" style="font-size: 9px; padding: 2px 6px;">${fb.status || 'PENDING'}</span>
                        </div>
                        <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px;">${new Date(fb.createdAt).toLocaleDateString()}</div>
                        
                        ${fb.adminResponse ? `
                            <div class="admin-response-box" style="margin-top: 8px; padding: 10px;">
                                <div class="admin-response-header" style="font-size: 11px;">Admin Response</div>
                                <div class="admin-response-text" style="font-size: 13px;">${fb.adminResponse}</div>
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            } catch (e) {
                list.innerHTML = '<div style="padding: 24px; text-align: center; color: var(--danger);">Failed to load history.</div>';
            }
        }

        function setupUserForm() {
            const form = document.getElementById('feedback-form');
            const successDiv = document.getElementById('feedback-success');
            
            form.onsubmit = async (e) => {
                e.preventDefault();
                const subject = document.getElementById('subject').value;
                const message = document.getElementById('message').value;
                
                try {
                    await submitFeedback(user.id, subject, message);
                    form.style.display = 'none';
                    successDiv.style.display = 'block';
                    loadUserHistory();
                } catch (err) {
                    alert('Error submitting feedback: ' + err.message);
                }
            };
        }
    </script>
</body>
</html>
